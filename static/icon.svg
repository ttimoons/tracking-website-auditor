<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0e"/>
      <stop offset="100%" style="stop-color:#161618"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#5b7fff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Code brackets -->
  <path d="M180 180 L120 256 L180 332" fill="none" stroke="#38383a" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M332 180 L392 256 L332 332" fill="none" stroke="#38383a" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slash -->
  <path d="M280 160 L232 352" fill="none" stroke="#38383a" stroke-width="28" stroke-linecap="round"/>

  <!-- Magnifying glass -->
  <circle cx="340" cy="340" r="60" fill="none" stroke="url(#accent)" stroke-width="24"/>
  <line x1="382" y1="382" x2="440" y2="440" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>

  <!-- Inner circle glow -->
  <circle cx="340" cy="340" r="40" fill="url(#accent)" opacity="0.15"/>
</svg>
